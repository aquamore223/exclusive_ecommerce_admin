<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Exclusive</title>
    
    <!-- CSS Links -->
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Additional styles for login page */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="admin-auth-container">
        <!-- Login Form -->
        <div id="login-form" class="admin-auth-box">
            <div class="admin-logo">
                <i class="fas fa-store"></i>
                <h2>Welcome Back</h2>
                <p>Login to your admin account</p>
            </div>
            <form id="admin-login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="admin@exclusive.com" autocomplete="email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <p class="auth-switch-text">
                    Don't have an account? 
                    <span id="show-signup" class="auth-switch-link">Create Admin Account</span>
                </p>
                <div id="login-error" class="error-message"></div>
            </form>
        </div>

        <!-- Signup Form (Hidden by default) -->
        <div id="signup-form" class="admin-auth-box" style="display: none;">
            <div class="admin-logo">
                <i class="fas fa-user-plus"></i>
                <h2>Create Account</h2>
                <p>Register as an administrator</p>
            </div>
            <form id="admin-signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signup-name" placeholder="Admin User" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signup-email" placeholder="admin@exclusive.com" autocomplete="email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signup-password" placeholder="Create a password" autocomplete="new-password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signup-confirm-password" placeholder="Confirm your password" autocomplete="new-password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Admin Secret Key</label>
                    <div class="input-group">
                        <i class="fas fa-key"></i>
                        <input type="password" id="signup-secret-key" placeholder="Enter admin secret key" autocomplete="off" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary login-btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
                <p class="auth-switch-text">
                    Already have an account? 
                    <span id="show-login" class="auth-switch-link">Login Here</span>
                </p>
                <div id="signup-error" class="error-message"></div>
                <div id="signup-success" class="success-message"></div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="admin-auth.js"></script>
</body>
</html>
